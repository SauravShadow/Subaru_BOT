services:
  virtual-company:
    build: .
    container_name: virtual-company
    env_file: .env
    user: "1000:1000"
    ports:
      - "3031:3030"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Claude Code auth + settings
      - /home/subaru/.claude:/home/nexus/.claude
      # Claude Code global config (at $HOME/.claude.json, not inside .claude/)
      - /home/subaru/.claude.json:/home/nexus/.claude.json
      # Claude binary versions — entrypoint exports CLAUDE_BIN to the latest
      - /home/subaru/.local/share/claude:/opt/claude:ro
      # App code mounted live: uvicorn --reload picks up self-modifications by workers
      - /home/subaru/projects/virtual-company:/app
      # All projects: workers can read/write any project
      - /home/subaru/projects:/workspace
      # HC volume mount so symlinks inside /workspace resolve correctly
      - /mnt/HC_Volume_105874680:/mnt/HC_Volume_105874680
    environment:
      - HOME=/home/nexus
      - WORK_DIR=/workspace
      - USER_EMAIL=sauravsubaru@gmail.com
      - MAX_STORAGE_GB=10
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - BARK_SVC_URL=http://bark-svc:9001
      # Optional: configure SMTP for CEO-to-user email
      # - SMTP_USER=your@gmail.com
      # - SMTP_PASS=your_app_password
    depends_on:
      bark-svc:
        condition: service_started
    restart: unless-stopped

  bark-svc:
    build: ./bark-svc
    container_name: bark-svc
    volumes:
      - /mnt/HC_Volume_105874680/bark-models:/root/.cache/suno/bark_v0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
