services:
  virtual-company:
    build: .
    container_name: virtual-company
    env_file: .env
    user: "1000:1000"
    ports:
      - "3031:3030"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Claude Code auth + settings
      - /home/subaru/.claude:/home/nexus/.claude
      # Claude Code global config (at $HOME/.claude.json, not inside .claude/)
      - /home/subaru/.claude.json:/home/nexus/.claude.json
      # Claude binary versions — entrypoint exports CLAUDE_BIN to the latest
      - /home/subaru/.local/share/claude:/opt/claude:ro
      # App code mounted live: uvicorn --reload picks up self-modifications by workers
      - /home/subaru/projects/virtual-company:/app
      # All projects: workers can read/write any project
      - /home/subaru/projects:/workspace
      # HC volume mount so symlinks inside /workspace resolve correctly
      - /mnt/HC_Volume_105874680:/mnt/HC_Volume_105874680
    environment:
      - HOME=/home/nexus
      - WORK_DIR=/workspace
      - USER_EMAIL=sauravsubaru@gmail.com
      - MAX_STORAGE_GB=10
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - BARK_SVC_URL=http://bark-svc:9001
      - BROWSER_SVC_URL=http://browser-svc:9002
      - TELNYX_API_KEY=${TELNYX_API_KEY:-}
      - TELNYX_PUBLIC_KEY=${TELNYX_PUBLIC_KEY:-}
      - TELNYX_CONNECTION_ID=${TELNYX_CONNECTION_ID:-}
      - TELNYX_PHONE_NUMBER=${TELNYX_PHONE_NUMBER:-}
      - TELNYX_VOICE=${TELNYX_VOICE:-female}
      - BASE_URL=${BASE_URL:-}
      - BARK_SPEAKER=${BARK_SPEAKER:-en-US-GuyNeural}
      # Optional: configure SMTP for CEO-to-user email
      # - SMTP_USER=your@gmail.com
      # - SMTP_PASS=your_app_password
    depends_on:
      bark-svc:
        condition: service_started
      browser-svc:
        condition: service_started
    restart: unless-stopped

  bark-svc:
    build: ./bark-lite
    container_name: bark-svc
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  browser-svc:
    build: ./browser-svc
    container_name: browser-svc
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Bound to localhost only — the frontend reaches browser-svc through the
      # backend proxy (/api/browser-svc/*), not directly, so this stays internal.
      - "127.0.0.1:9002:9002"
    volumes:
      # Source mounted live so code changes don't require image rebuilds
      - /home/subaru/projects/virtual-company/browser-svc:/app
      # Files outside the browser-svc source tree
      - /mnt/HC_Volume_105874680/virtual-company/Saurav_CE_SE_.pdf:/app/cv_default.pdf:ro
      - /mnt/HC_Volume_105874680/virtual-company/cv_template.tex:/app/cv_template.tex:ro
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - NEXUS_WS_URL=ws://virtual-company:3030/ws/browser-relay
      # Set to a residential proxy to bypass Akamai IP blocks (e.g. naukri.com)
      # Format: http://user:pass@host:port  or  socks5://host:port
      - BROWSER_PROXY_URL=${BROWSER_PROXY_URL:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
